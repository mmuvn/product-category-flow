# Use postgres/example user/password credentials

services:
  db:
    image: postgres
    restart: unless-stopped
    # set shared memory limit when using docker compose
    shm_size: 128mb
    # or set shared memory limit when deploy via swarm stack
    #volumes:
    #  - type: tmpfs
    #    target: /dev/shm
    #    tmpfs:
    #      size: 134217728 # 128*2^20 bytes = 128Mb
    #environment:
    #  POSTGRES_USER: sa
    #  POSTGRES_PASSWORD: example
    env_file: ".env"
    ports:
      - 5432:5432
    networks:
      - backend

  pqAdmin:
    image: dpage/pgadmin4
    restart: unless-stopped
    env_file: ".env"
    ports:
      - 81:80
    networks:
      - backend

  app:
    build: 
      context: ./Backend
      dockerfile: ./Dockerfile
    image: treeshopmanagingsystem:latest
    restart: unless-stopped
    env_file: ".env"
    depends_on: 
      - db
    networks:
      - frontend
      - backend
  
  frontend:
    build:
      context: ./Frontend
      dockerfile: ./Dockerfile
    image: frontend:latest
    restart: unless-stopped
    networks:
      - frontend
    ports: 
      - 3000:3000

networks:
  frontend:
    driver: bridge
  backend:
    driver: bridge
